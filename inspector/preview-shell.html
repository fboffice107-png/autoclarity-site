<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Report Preview — AutoClarity Inspector</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#060b18" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="stylesheet" href="/assets/css/site.css" />
  <link rel="stylesheet" href="/assets/css/ppi.css" />
  <link rel="stylesheet" href="/assets/css/report.css" />
  <link rel="stylesheet" href="/assets/css/inspector.css" />
</head>
<body>
  <header class="nav nav-solid">
    <div class="nav-inner">
      <a class="nav-brand" href="/inspector/" aria-label="Inspector workspace home">
        <img src="/assets/img/icon-64.png" alt="" width="32" height="32" />
        <span>AutoClarity</span>
      </a>
      <span class="footer-muted" style="font-size:14px;" id="headRef">Report preview</span>
    </div>
  </header>

  <main class="insp-wrap" style="max-width:900px;">
    <div id="app"><div class="portal-card"><p>Building the preview…</p></div></div>
  </main>

  <div class="insp-bottom" id="bottomBar" hidden>
    <a class="btn btn-ghost" id="backBtn" href="#">← Editor</a>
    <div class="grow"></div>
    <button class="btn btn-primary" id="publishBtn" type="button" hidden>Publish report…</button>
  </div>

  <div class="publish-modal" id="publishModal" hidden>
    <div class="box">
      <h2 id="publishTitle">Publish this report?</h2>
      <p style="color:var(--text-2);font-size:14px;margin:10px 0;">
        Publishing locks this version, makes it visible in the customer's secure
        portal, and records it permanently. Corrections after publishing require
        an amendment (a new version).
      </p>
      <div class="field" id="amendReasonField" hidden>
        <label for="amendReason">Amendment reason (shown in version history)</label>
        <input id="amendReason" type="text" maxlength="500" />
      </div>
      <div class="field">
        <label for="confirmRef">Type the request reference to confirm</label>
        <input id="confirmRef" type="text" autocomplete="off" autocapitalize="characters" />
      </div>
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="btn btn-ghost" id="cancelPublish" type="button">Cancel</button>
        <button class="btn btn-primary" id="confirmPublish" type="button" disabled>Publish</button>
      </div>
      <p class="form-status" id="publishStatus" role="status"></p>
    </div>
  </div>

  <script src="/assets/js/inspector-common.js" defer></script>
  <script src="/assets/js/report-render.js" defer></script>
  <script src="/assets/js/inspector-preview.js" defer></script>
</body>
</html>
